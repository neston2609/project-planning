name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /app/project-planning

            git pull origin main

            # install deps
            npm install

            # build frontend
            cd frontend
            npm run build
            cp -rp dist/ ../

            # restart backend
            pm2 restart rpa-planning-backend