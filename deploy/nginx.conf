# nginx config for RPA Planning — production reverse proxy.
#
# Place at /etc/nginx/sites-available/rpa-planning, then:
#   sudo ln -s /etc/nginx/sites-available/rpa-planning /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Update server_name and ssl_* paths for your environment. The Let's Encrypt
# block at the top is a starting point — comment it out for plain HTTP only.

server {
    listen 80;
    server_name rpa.example.com;
    # ACME http-01 (Let's Encrypt) lives outside the redirect.
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    server_name rpa.example.com;

    ssl_certificate     /etc/letsencrypt/live/rpa.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rpa.example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    add_header          X-Frame-Options "SAMEORIGIN" always;
    add_header          X-Content-Type-Options "nosniff" always;
    add_header          Referrer-Policy "strict-origin-when-cross-origin" always;

    # ----- React/Vite static build -----
    root /var/www/rpa-planning;
    index index.html;
    location / {
        try_files $uri /index.html;
    }
    # Cache hashed JS/CSS aggressively
    location ~* \.(?:js|css|woff2?|svg|png|jpg|jpeg|gif|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ----- API reverse proxy -----
    # Backend is bound to 127.0.0.1:6000 by PM2.
    location /api/ {
        proxy_pass http://127.0.0.1:6000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        client_max_body_size 5M;
    }

    # Don't expose the .env or .git or anything starting with a dot
    location ~ /\. { deny all; access_log off; log_not_found off; }
}
