# nginx config for RPA Planning — production reverse proxy (HTTP only).
#
# Place at /etc/nginx/sites-available/rpa-planning, then:
#   sudo ln -s /etc/nginx/sites-available/rpa-planning /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Update server_name for your environment (use _ to match any host).
# To add HTTPS later, run: sudo certbot --nginx -d rpa.example.com

server {
    listen 80 default_server;
    server_name _;

    # ----- React/Vite static build -----
    root /var/www/rpa-planning;
    index index.html;
    location / {
        try_files $uri /index.html;
    }
    # Cache hashed JS/CSS aggressively
    location ~* \.(?:js|css|woff2?|svg|png|jpg|jpeg|gif|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ----- API reverse proxy -----
    # Backend is bound to 127.0.0.1:6000 by PM2.
    location /api/ {
        proxy_pass http://127.0.0.1:6000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        client_max_body_size 5M;
    }

    # Don't expose the .env or .git or anything starting with a dot
    location ~ /\. { deny all; access_log off; log_not_found off; }
}
